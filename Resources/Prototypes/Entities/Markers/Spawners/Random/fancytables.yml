- type: entity
  name: random fancy table spawner
  id: FancyTableSpawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Structures/Furniture/Tables/Fancy/blue.rsi
      state: full
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: TableFancyBlue
      - id: TableFancySkyBlue
      - id: TableFancyCyan
      - id: TableFancyBlack
      - id: TableFancyRed
      - id: TableFancyPurple
      - id: TableFancyPink
      - id: TableFancyGreen
      - id: TableFancyOrange
      - id: TableFancyWhite
    offset: 0.0
