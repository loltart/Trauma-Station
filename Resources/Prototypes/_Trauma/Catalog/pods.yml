- type: entity
  id: SpawnIngredientsBaking
  categories: [ HideSpawnMenu ]
  name: baking supplies
  parent: SpawnSupplyEmpty
  components:
  - type: SpawnTableOnDespawn
    table: !type:AllSelector
      children:
      - id: FoodSnackRaisins
        amount: 4
      - id: FoodSnackChocolate
