- type: entity
  parent: [BasePlushie,BaseMajorContraband]
  id: PatreonWeax
  name: armok's decapitated skull
  description: It is of the lowest quality.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Patreon/weax.rsi
    state: icon
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Voice/Skeleton/skeleton_scream.ogg
  - type: EmitSoundOnActivate
    sound:
      path: /Audio/Voice/Skeleton/skeleton_scream.ogg
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Voice/Skeleton/skeleton_scream.ogg
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/Voice/Skeleton/skeleton_scream.ogg
  - type: Edible
    requiresSpecialDigestion: true
    useSound:
      path: /Audio/Voice/Skeleton/skeleton_scream.ogg
  - type: MeleeWeapon
    wideAnimationRotation: 180
    soundHit:
      path: /Audio/Voice/Skeleton/skeleton_scream.ogg

