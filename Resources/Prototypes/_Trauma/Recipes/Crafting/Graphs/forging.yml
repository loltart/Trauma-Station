- type: constructionGraph
  id: Handle
  start: start
  graph:
  - node: start
    edges:
    - to: unfinishedhandle
      steps:
        - material: WoodPlank
          amount: 3
          doAfter: 4

  - node: unfinishedhandle
    entity: UnfinishedHandle
    edges:
    - to: handlelarge
      steps:
        - tool: Slicing
          doAfter: 1

  - node: handlelarge
    entity: HandleLarge
    edges:
    - to: handlemedium
      completed:
        - !type:SpawnPrototype
          prototype: HandleSmall
          amount: 1
      steps:
        - tool: Slicing
          doAfter: 1

  - node: handlemedium
    entity: HandleMedium
    edges:
    - to: handlesmall
      completed:
        - !type:SpawnPrototype
          prototype: HandleSmall
          amount: 1
      steps:
        - tool: Slicing
          doAfter: 1

  - node: handlesmall
    entity: HandleSmall

- type: constructionGraph
  id: AnvilTop
  start: start
  graph:
  - node: start
    edges:
    - to: finish
      steps:
      - tag: IngotWorkableSteel
        name: construction-graph-tag-ingotsteel
        icon:
          sprite: _Trauma/Objects/Specific/forging.rsi
          state: ingot_steel
        doAfter: 5
      - tag: IngotWorkableSteel
        name: construction-graph-tag-ingotsteel
        icon:
          sprite: _Trauma/Objects/Specific/forging.rsi
          state: ingot_steel
  - node: finish
    entity: AnvilTopUnfinished

