- type: lavalandPlanet
  id: LavalandPlanet
  name: lavaland-planet-name-lavaland
  mapLight: "#f0a959"
  biome: LavaLand
  atmosphere:
    volume: 2500
    immutable: True
    temperature: 308.4523 # 35.3023 C
    moles:
      Oxygen: 10.524779 # not enough for breathing
      Nitrogen: 25.10312
      CarbonDioxide: 8.21301
  markers:
  - RandomTendrilLavaland
  - RandomMobLavaland
  - OreIron
  - OreCoal
  - OreQuartz
  - OreGold
  - OreSilver
  - OrePlasma
  - OreUranium
  - OreBananium
  - OreArtifactFragment
  - OreDiamond
  - OreBSCrystal
  #- OreGibtonite # It's broken right now sadly because of how Gatherable works :(
  addComponents:
  - type: FTLDestination
    whitelist: # TODO fix shuttles FTLing on planets and remove this whitelist
      components:
      - MiningShuttle
  - type: WeatherScheduler # Regular ash storms
    stages:
    - duration: # 10-15 minutes of calm
        min: 600
        max: 900
    - weather: WeatherAshfallLight
      message: ash-storm-telegraph
      duration:
        min: 90
        max: 120
    - weather: WeatherAshfall
      message: ash-storm-alert
      duration:
        min: 120
        max: 180
    - weather: WeatherAshfallLight
      message: ash-storm-clearing
      duration:
        min: 30
        max: 30
