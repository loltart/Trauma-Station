# tables

- type: entityTable
  id: CalmPestEventsTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - id: SnailMigrationLowPop
    - id: CockroachMigration
    - id: MouseMigration
    - id: RandomCritterHorde

- type: entityTable
  id: SpicyPestEventsTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - id: KingRatMigration
    - id: SnailMigration

# events

- type: entity
  id: MouseMigration
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    earliestStart: 15
    weight: 6
    duration: 30 # DeltaV: was 50, used as a delay now
  - type: VentCrittersRule
    table: !type:GroupSelector # DeltaV: EntityTable instead of spawn entries
      children:
      - id: SpawnMobMouse
      - id: MobMouseCancer
        weight: 0.02
# Events always spawn a critter regardless of Probability https://github.com/space-wizards/space-station-14/issues/28480 I added the Rat King to their own event with a player cap.

- type: entity
  id: KingRatMigration
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    earliestStart: 15
    weight: 6
    duration: 30 # DeltaV: was 50, used as a delay now
    minimumPlayers: 30 # Hopefully this is enough for the Rat King's potential Army (it was not, raised from 15 -> 30)
  - type: VentCrittersRule # We don't use Horde here to make RK spawns less predictable.
    entries:
    # <Trauma>
    - id: MobLootbug
      prob: 0.008
    # </Trauma>
    - id: MobMouse
      prob: 0.02
    - id: MobMouse1
      prob: 0.02
    - id: MobMouse2
      prob: 0.02
    - id: MobMouseCancer
      prob: 0.001
    specialEntries:
    - id: SpawnPointGhostRatKing
      prob: 0.001

- type: entity
  id: CockroachMigration
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    weight: 6
    duration: 30 # DeltaV: was 50, used as a delay now
  - type: VentCrittersRule
    table: !type:GroupSelector # DeltaV: EntityTable instead of spawn entries
      children:
      - id: MobCockroach
        weight: 0.79
      - id: MobMothmaggot # Trauma - was MobMothroach
        weight: 0.20
      - id: MobLootbug # Goobstation
        weight: 0.3
      - id: MobMoproach
        weight: 0.01

- type: entity
  id: SnailMigrationLowPop
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    weight: 6
    duration: 30 # DeltaV: was 50, used as a delay now
  - type: VentCrittersRule
    table: !type:GroupSelector # DeltaV: EntityTable instead of spawn entries
      children:
      - id: MobSnail
      - id: MobSnailSpeed
      - id: MobSnailMoth

- type: entity
  id: SnailMigration
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    earliestStart: 15
    weight: 6
    duration: 30 # DeltaV: was 50, used as a delay now
    minimumPlayers: 30
  - type: VentCrittersRule
    entries:
    - id: MobSnail
      prob: 0.02
    - id: MobSnailSpeed
      prob: 0.002
    - id: MobSnailMoth
      prob: 0.002
    - id: MobSnailInstantDeath
      prob: 0.00004 # Trauma - 4x

- type: entity
  parent: BaseStationEventShortDelay
  id: RandomCritterHorde # My deepest apologies, Mr. Secoff. You just wasted your time :)
  components:
  - type: StationEvent
    startAnnouncement: station-event-vent-creatures-start-horde-announcement
    startAudio:
      path: /Audio/Announcements/attention.ogg
    earliestStart: 15
    weight: 6 # Slightly more common than other hordes
    duration: 5
    maxDuration: 20
    reoccurrenceDelay: 15 # Shorter because this event is basically a nat zero on the round. It only exists to potentially confuse security or the crew
  - type: VentHordeRule
    table: !type:GroupSelector
      rolls: 3,5
      children:
      - !type:GroupSelector
        children: # Increased chances for special snails on purpose. Makes it a bit more interesting.
        - id: MobSnail
        - id: MobSnailSpeed
        - id: MobSnailMoth
      - !type:GroupSelector
        children: # Increased chances for special roaches on purpose. Makes it a bit more interesting.
        - id: MobCockroach
        - id: MobMothroach
        - id: MobMoproach
          weight: 0.5
      - !type:GroupSelector
        children:
        - id: MobMouse
        - id: MobMouse1
        - id: MobMouse2
